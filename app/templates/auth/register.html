{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 p-4">
            <h3 class="mb-4 text-center fw-bold">註冊新帳號</h3>
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">使用者名稱</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">電子信箱</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密碼</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-4">
                    <label for="confirm_password" class="form-label">確認密碼</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">註冊</button>
                </div>
                <div class="mt-3 text-center">
                    <small class="text-muted">已經有帳號了？ <a href="{{ url_for('auth.login') }}">點此登入</a></small>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
