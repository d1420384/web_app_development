{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-3">
                <h4 class="mb-0 fw-bold">{{ action|default("新增") }}食譜</h4>
            </div>
            <div class="card-body p-4">
                <form action="{% if recipe %}{{ url_for('recipe.edit', id=recipe.id) }}{% else %}{{ url_for('recipe.create') }}{% endif %}" method="POST">
                    
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">食譜標題 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" required value="{{ recipe.title if recipe else '' }}" placeholder="例如：台式滷肉飯">
                    </div>
                    
                    <div class="mb-3">
                        <label for="image_url" class="form-label fw-bold">圖片網址 (圖片連結)</label>
                        <input type="url" class="form-control" id="image_url" name="image_url" value="{{ recipe.image_url if recipe else '' }}" placeholder="輸入 http 開頭的網址">
                    </div>
                    
                    <div class="mb-3">
                        <label for="ingredients" class="form-label fw-bold">食材內容 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="ingredients" name="ingredients" rows="5" required placeholder="請列出所需食材，例如：
豬五花 半斤
醬油 3大匙
蒜頭 2瓣...">{{ recipe.ingredients if recipe else '' }}</textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="steps" class="form-label fw-bold">製作步驟 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="steps" name="steps" rows="6" required placeholder="請說明處理步驟，例如：
1. 豬五花切細丁。
2. 放入鍋中乾煸逼出油脂。
... ">{{ recipe.steps if recipe else '' }}</textarea>
                    </div>

                    <div class="form-check form-switch mb-4">
                        <input class="form-check-input" type="checkbox" id="is_public" name="is_public" value="1" {% if recipe and recipe.is_public == 1 %}checked{% endif %}>
                        <label class="form-check-label fw-bold" for="is_public">將此食譜發布到公開牆（讓所有人看見）</label>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ request.referrer or url_for('recipe.dashboard') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">儲存食譜</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
